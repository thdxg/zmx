name: Sync Upstream

# Keep this fork exactly ONE commit ahead of neurosnap/zmx. Rather than
# rebasing the downstream commits onto upstream (which re-expands history to N
# commits every sync), we reset main to upstream and re-commit the entire
# downstream delta as a single squashed commit. The result is deterministic:
# `git log upstream/main..main` is always one commit, no matter how many
# changes the delta contains. The delta is the CI that builds + publishes
# the prebuilt arm64 zmx binary Macterm's setup.sh downloads, plus the OSC 8
# state-tracking strip (supabitapp/zmx cherry-pick, author khoi — see PR #1;
# drop it once upstream's ghostty-vt includes ghostty#10358).

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Squash-sync onto upstream
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/neurosnap/zmx.git
          git fetch upstream main

          # Capture the current downstream delta (everything on main that isn't
          # already in upstream) as a patch. If there's no delta, fast-forward.
          if git diff --quiet upstream/main..HEAD; then
            echo "No downstream changes; fast-forwarding to upstream."
            git reset --hard upstream/main
            git push --force-with-lease
            exit 0
          fi
          git diff upstream/main..HEAD > /tmp/downstream.patch

          # Rebuild main as: upstream HEAD + one commit carrying the whole delta.
          git reset --hard upstream/main
          git apply --index /tmp/downstream.patch
          git commit -m "downstream: prebuilt-binary CI + OSC 8 state-tracking strip

          Single squashed commit of all thdxg/zmx customizations on top of
          upstream neurosnap/zmx: the GitHub Actions that build/publish the
          prebuilt binary, and the OSC 8 strip from terminal state tracking
          (cherry-picked from supabitapp/zmx, author khoi; prevents daemon
          aborts on link-heavy TUIs, zmx#182 — drop when upstream ghostty-vt
          includes ghostty#10358). Regenerated by sync-upstream.yml."

          git push --force-with-lease
